<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Madhan Raj G | Cloud Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050814;
  --card:#0c1224;
  --border:rgba(255,255,255,0.08);
  --text:#eaf2ff;
  --muted:#94a3b8;
  --accent:#22d3ee;
  --accent2:#6366f1;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 15% 10%,#0f1b33,#050814 60%);color:var(--text);overflow-x:hidden}

/* ===== PREMIUM BLOBS ===== */
body::before, body::after{content:"";position:fixed;width:520px;height:520px;border-radius:50%;filter:blur(150px);opacity:.25;z-index:-1}
body::before{background:#22d3ee;top:-160px;left:-160px}
body::after{background:#6366f1;bottom:-200px;right:-160px}

/* ===== NAVBAR ===== */
.navbar{position:sticky;top:0;z-index:1000;background:rgba(6,10,25,.65);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:auto;padding:16px 22px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;letter-spacing:.5px}
.nav-links a{color:var(--muted);text-decoration:none;margin-left:24px;font-size:.95rem;font-weight:500;position:relative}
.nav-links a::after{content:"";position:absolute;left:0;bottom:-6px;width:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
.nav-links a:hover{color:#fff}
.nav-links a:hover::after{width:100%}

/* ===== HERO ===== */
.hero{max-width:1200px;margin:auto;padding:130px 20px 100px;display:grid;gap:50px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));align-items:center}
.hero h1{font-size:3.4rem;line-height:1.12;margin-bottom:12px;font-weight:800}
.gradient{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.typing{color:var(--muted);margin-bottom:24px;min-height:26px;font-weight:600}
.hero p{color:var(--muted);margin-bottom:30px;font-size:1.02rem}
.hero img{width:280px;border-radius:26px;border:1px solid var(--border);justify-self:center;animation:float 5s ease-in-out infinite;box-shadow:0 30px 80px rgba(0,0,0,.55)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}

.btn{display:inline-block;padding:13px 24px;border-radius:14px;text-decoration:none;font-size:.95rem;font-weight:700;margin-right:14px;transition:.28s ease}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 18px 40px rgba(34,211,238,.35)}
.btn-secondary{border:1px solid var(--border);color:var(--text)}
.btn:hover{transform:translateY(-4px) scale(1.02)}

/* ===== SECTION ===== */
.section{max-width:1200px;margin:auto;padding:100px 20px}
.section-title{margin-bottom:40px}
.section-title small{color:#22d3ee;letter-spacing:2.5px;font-weight:700}
.section-title h2{font-size:2.5rem;margin-top:8px;font-weight:800}

.card{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--border);border-radius:24px;padding:32px;position:relative;overflow:hidden;transition:.35s cubic-bezier(.2,.65,.2,1)}
.card::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(34,211,238,.18),transparent);opacity:0;transition:.35s}
.card:hover::before{opacity:1}
.card:hover{transform:translateY(-8px);box-shadow:0 35px 90px rgba(0,0,0,.55)}

.grid{display:grid;gap:28px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.tag{display:inline-block;padding:7px 14px;border-radius:999px;background:#111a2e;border:1px solid var(--border);font-size:.85rem;margin:6px;color:#cfe1ff}

/* ===== STATS ===== */
.stats{display:grid;gap:22px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:20px}
.stat{text-align:center;padding:24px;border-radius:18px;background:var(--card);border:1px solid var(--border)}
.stat h3{font-size:2rem;margin-bottom:4px}
.stat p{color:var(--muted);font-size:.9rem}

/* ===== TIMELINE ===== */
.timeline{border-left:2px solid var(--accent);padding-left:18px}
.timeline-item{margin-bottom:16px;color:var(--muted)}

/* ===== CONTACT ===== */
.input{width:100%;padding:16px 18px;border-radius:16px;background:#0a1124;border:1px solid var(--border);color:#fff;margin-bottom:16px;font-size:.95rem}
.input:focus{outline:none;border-color:#22d3ee}
.send-btn{width:100%;padding:18px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:1.05rem;box-shadow:0 18px 40px rgba(34,211,238,.35);cursor:pointer}
.send-btn:hover{transform:translateY(-2px)}

/* ===== SOCIAL ===== */
.socials{display:flex;gap:14px;margin-top:18px}
.socials a{padding:10px 14px;border-radius:12px;border:1px solid var(--border);color:var(--muted);text-decoration:none;font-size:.9rem}
.socials a:hover{color:#fff;border-color:#22d3ee}

/* ===== REVEAL ===== */
.reveal{opacity:0;transform:translateY(60px);transition:all .9s cubic-bezier(.2,.65,.2,1)}
.reveal.active{opacity:1;transform:translateY(0)}

footer{text-align:center;padding:70px 20px;color:var(--muted);border-top:1px solid var(--border);font-size:.95rem}
@media(max-width:600px){.hero h1{font-size:2.3rem}}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-inner">
    <div class="logo">Madhan Raj G</div>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#services">Services</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</div>

<section class="hero">
  <div>
    <h1>Hi, I'm <span class="gradient">Madhan Raj</span></h1>
    <div class="typing" id="typing"></div>
    <p>AWS Certified Cloud Practitioner focused on Python, Data Analytics, and Cloud Computing.</p>
    <a class="btn btn-primary" href="#contact">Contact Me</a>
    <a class="btn btn-secondary" href="resume.pdf" download>Download Resume</a>

    <div class="socials">
      <a href="https://github.com/MadhanRajG1" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/madhan-raj-g-172409292" target="_blank">LinkedIn</a>
      <a href="mailto:madhanrajmaddy007@gmail.com">Email</a>
    </div>
  </div>
  <img src="profile.jpg" alt="Madhan Raj G" />
</section>

<section class="section reveal" id="about">
  <div class="section-title">
    <small>WHO I AM</small>
    <h2>About <span class="gradient">Me</span></h2>
  </div>
  <div class="card">
    <form action="https://formspree.io/f/mwvndazk" method="POST">
      <input class="input" name="name" placeholder="Your Name" required />
      <input class="input" type="email" name="email" placeholder="Your Email" required />
      <textarea class="input" name="message" rows="4" placeholder="Your Message" required></textarea>
      <button class="send-btn" type="submit">Send Message</button>
    </form>
  </div>
</section>

<footer>© 2026 Madhan Raj G — Built to Stand Out</footer>

<script>
const roles=["AWS CCP Certified","Career Switcher","Open to Opportunities"];
let i=0,j=0,current='',del=false;
function type(){const el=document.getElementById('typing');current=roles[i];if(del){el.textContent=current.substring(0,j--);if(j<0){del=false;i=(i+1)%roles.length}}else{el.textContent=current.substring(0,j++);if(j>current.length){del=true;setTimeout(type,1200);return}}setTimeout(type,del?40:70)}
type();

const observer=new IntersectionObserver(entries=>{entries.forEach((entry,idx)=>{if(entry.isIntersecting){setTimeout(()=>entry.target.classList.add('active'),idx*120);}});},{threshold:.15});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
</script>

</body>
</html>
